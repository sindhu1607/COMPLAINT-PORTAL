{% load static %}
<!doctype html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Campus Complaint Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="{% static 'css/portal.css' %}" rel="stylesheet">
</head>
<body class="public-body">
<nav class="public-nav">
    <a class="brand public-brand" href="{% url 'home' %}">
        <span class="brand-mark"><i class="bi bi-building-check"></i></span>
        <span>
            <strong>Campus</strong>
            <small>Complaint Portal</small>
        </span>
    </a>
    <div class="public-actions">
        <a class="btn btn-outline-primary btn-sm" href="{% url 'login' %}">Student Login</a>
        <a class="btn btn-dark btn-sm" href="{% url 'faculty_login' %}">Faculty Login</a>
    </div>
</nav>

{% if messages %}
    <div class="public-message-stack">
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'js/portal.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
