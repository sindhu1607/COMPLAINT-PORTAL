{% extends "base.html" %}

{% block title %}Reset Email Sent | Campus Complaint Portal{% endblock %}
{% block page_heading %}Check Your Email{% endblock %}

{% block content %}
<div class="panel auth-card mx-auto text-center">
    <i class="bi bi-envelope-check display-icon"></i>
    <h3>Password reset link sent</h3>
    <p class="text-secondary">If the email exists in the system, a reset link has been generated.</p>
    <a class="btn btn-primary" href="{% url 'login' %}">
        <i class="bi bi-arrow-left"></i>
        Back to Login
    </a>
</div>
{% endblock %}
