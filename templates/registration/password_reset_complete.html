{% extends "base.html" %}

{% block title %}Password Updated | Campus Complaint Portal{% endblock %}
{% block page_heading %}Password Updated{% endblock %}

{% block content %}
<div class="panel auth-card mx-auto text-center">
    <i class="bi bi-shield-check display-icon"></i>
    <h3>Your password has been updated</h3>
    <p class="text-secondary">You can now log in with the new password.</p>
    <a class="btn btn-primary" href="{% url 'login' %}">
        <i class="bi bi-box-arrow-in-right"></i>
        Login
    </a>
</div>
{% endblock %}
